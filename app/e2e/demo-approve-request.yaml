appId: com.openauth.app
---
# Assumes demo mode is already active (run onboarding-demo.yaml first)

- assertVisible: "Assistant Pro"
- assertVisible: "pending authorization"
- tapOn:
    id: "pending-auth-banner"

- takeScreenshot:
    path: e2e/screenshots/demo-approve/01-request
- assertVisible: "Authorization Request"
- assertVisible: "Send weekly summary report"
- assertVisible: "Low Risk"

- tapOn: "Approve"

- tapOn: "History"
- assertVisible: "Send weekly summary report"
