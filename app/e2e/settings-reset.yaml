appId: com.openauth.app
---
# Assumes demo mode is already active

- tapOn: "Settings"

- assertVisible: "Security Settings"
- scrollUntilVisible:
    element: "Reset All Data"
    direction: DOWN

- tapOn: "Reset All Data"
- tapOn: "Continue"
- tapOn: "Reset Everything"

- assertVisible: "Authorize with Confidence"
